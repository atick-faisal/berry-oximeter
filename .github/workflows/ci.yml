name: 🚀 CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: 🔍 Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v6

      - name: 📦 Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"  # Running linting only on Python 3.12

      - name: 📥 Install Dependencies
        run: uv sync --all-extras --dev

      - name: 🧐 Run Ruff Linter
        run: uv run ruff check

  test:
    name: 🧪 Run Tests
    needs: lint  # Runs only if linting succeeds ✅
    runs-on: windows-latest  # Running tests only on Windows

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v6

      - name: 📦 Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: 📥 Install Dependencies
        run: uv sync --all-extras --dev

      - name: 🚀 Run Tests
        run: uv run hatch test --parallel --all

  test-release:
    name: 📦 Build & Publish Package
    needs: test  # Runs only if tests pass ✅
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v6

      - name: 📦 Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: 📥 Install Dependencies
        run: uv sync --all-extras --dev

      - name: 🔖 Version Package
        run: uv run hatch version rc

      - name: 📦 Build Package
        run: uv run hatch build

      - name: 🚀 Publish to TestPyPi
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
